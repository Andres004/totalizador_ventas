<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Totalizador - Incremental</title>
</head>
<body>
    <h1>Totalizador de Ventas</h1>

    <form id="totalizador-form">
        <label for="cantidad">Cantidad de ítems:</label>
        <input type="number" id="cantidad-input">
        <br><br>
        <label for="precio">Precio de ítems:</label>
        <input type="number" id="precio-input">
        <br><br>
        <button type="submit" id="totalizar-btn">Mostrar Datos</button>
    </form>

    <div id="resultado-div">
        <p>Cantidad ingresada: <span id="cantidad-display">0</span></p>
        <p>Precio ingresado: <span id="precio-display">0</span></p>
    </div>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
