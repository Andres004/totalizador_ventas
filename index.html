<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Totalizador - Desarrollo Evolutivo</title>
</head>
<body>
  <h1 style="text-align: center;">Totalizador de Ventas</h1>

    <form id="totalizador-form">
        <div>
            <label for="cantidad-input">Cantidad de ítems:</label>
            <input type="number" id="cantidad-input">
            <p style="text-align: end;">Cantidad:<strong> <span id="cantidad-display">0</span></strong></p>
        </div>
        
        <div>
            <label for="precio-input">Precio por ítem:</label>
            <input type="number" id="precio-input">
            <p style="text-align: end;">Precio:<strong><span id="precio-display">0</span></strong></p>
        </div>
        <br>
        <button type="submit" id="totalizar-btn">Calcular</button>
        
    </form>


    <p style="text-align: end;"><strong>Precio Neto: $<span id="neto-display">0</span><strong></p>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
